!DOCTYPE html>
<html lang="en-US">
<head>
    <link rel="stylesheets" type="css" href="contact.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- ... other meta tags and stylesheets ... -->

<body>
    <header>
        <!-- ... header content ... -->
    </header>
    <main>
        <div class="hero">
            <img src="images/contact-hero.jpg" alt="Contact Us Hero Image">
            <h1>Get in Touch with Us</h1>
        </div>
        <section>
            <h2>Company Information</h2>
            <p>
                Address: 4449 Emganwini, Bulawayo, Zimbabwe<br>
                Phone: +263 77 379 4891<br>
                Email: <a href="mailto:geraldmango3@gmail.com">info@hillside-water-world.com</a>
            </p>
            <iframe src="(link unavailable)?..." frameborder="0" style="border:0" allowfullscreen></iframe>
        </section>
        <section>
            <h2>Meet Our Team</h2>
            <div class="team-grid">
                <figure>
                    <img src="images/team-member.jpg" alt="Team Member 1">
                    <figcaption>Gerald Mango, CEO</figcaption>
                </figure>
                <figure>
                    <img src="images/team-member2.jpg" alt="Team Member 2">
                    <figcaption>Nolwazi Manongore, Marketing Manager</figcaption>
                </figure>
                <!-- ... add more team members ... -->
            </div>
        </section>
        <section>
            <h2>Get in Touch</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name"><br><br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email"><br><br>
                <label for="message">Message:</label>
                <textarea id="message" name="message"></textarea><br><br>
                <label for="newsletter">Subscribe to our newsletter:</label>
                <input type="checkbox" id="newsletter" name="newsletter"><br><br>
                <input type="submit" value="Send Message">
            </form>
        </section>
    </main>
    <footer>
        <!-- ... footer content ... -->
    </footer>
